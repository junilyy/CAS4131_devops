name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Static syntax check
        run: |
          python -m py_compile $(find . -name '*.py' -not -path './.venv/*')

      - name: Start FastAPI server in background
        run: |
          nohup uvicorn app.main:app --host 0.0.0.0 --port 8000 --log-level info > server.log 2>&1 &
          for i in {1..15}; do
            if curl -f http://127.0.0.1:8000/health; then
              echo "Server is ready"
              exit 0
            fi
            sleep 1
          done
          cat server.log
          echo "Server failed to start" && exit 1

      - name: Health check
        run: |
          curl --fail --retry 5 --retry-delay 2 http://127.0.0.1:8000/health

      - name: API endpoint check - subscribers
        run: |
          curl --fail -s http://127.0.0.1:8000/api/subscribers | python -m json.tool

      - name: API endpoint check - subscriber devices
        run: |
          curl --fail -s http://127.0.0.1:8000/api/subscribers/U001/devices | python -m json.tool

      - name: Stop server
        if: always()
        run: |
          pkill -f "uvicorn app.main:app" || true
